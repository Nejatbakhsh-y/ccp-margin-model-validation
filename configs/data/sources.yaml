data:
  start_date: "2007-01-01"
  end_date: null
  base_currency: USD
  price_field: adjusted_close
  minimum_completeness: 0.995
  timezone: UTC
  duplicate_policy: error
  missing_price_policy: forward_fill_limited
  maximum_forward_fill_days: 3
  non_trading_day_policy: use_common_trading_dates
  corporate_action_policy: use_adjusted_prices

  market_data:
    provider: yahoo_finance
    package: yfinance
    enabled: true
    auto_adjust: false
    progress_display: false

    field_mapping:
      adjusted_close: "Adj Close"
      close: "Close"
      open: "Open"
      high: "High"
      low: "Low"
      volume: "Volume"

    symbols:
      equity:
        - SPY
        - QQQ
        - IWM
        - EFA
        - EEM

      treasury:
        - SHY
        - IEF
        - TLT

      credit:
        - LQD
        - HYG

      commodities:
        - GLD
        - DBC

      real_estate:
        - VNQ

      currency:
        - UUP

  macro_data:
    provider: fred
    package: pandas_datareader
    enabled: true

    series:
      DGS2:
        description: 2-Year Treasury Constant Maturity Rate
        frequency: daily

      DGS10:
        description: 10-Year Treasury Constant Maturity Rate
        frequency: daily

      T10Y2Y:
        description: 10-Year Treasury Minus 2-Year Treasury Spread
        frequency: daily

      VIXCLS:
        description: CBOE Volatility Index
        frequency: daily

      BAMLH0A0HYM2:
        description: ICE BofA US High Yield Option-Adjusted Spread
        frequency: daily

  storage:
    raw_market_directory: data/raw/market
    raw_macro_directory: data/raw/macro
    interim_directory: data/interim
    processed_directory: data/processed
    manifest_directory: data/manifests
    file_format: parquet
    compression: snappy
    preserve_raw_downloads: true
