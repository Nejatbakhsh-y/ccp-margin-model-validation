validation:
  significance_level: 0.05
  backtest_window: 250
  reconciliation_tolerance: 1.0e-8
  monetary_reconciliation_tolerance: 0.01
  exception_definition: realized_loss_exceeds_margin
  preserve_failed_tests: true
  preserve_negative_results: true

  required_tests:
    implementation_reconciliation: true
    kupiec_unconditional_coverage: true
    christoffersen_independence: true
    christoffersen_conditional_coverage: true
    basel_traffic_light: true
    benchmark_model_comparison: true
    parameter_sensitivity: true
    stressed_period_analysis: true
    margin_shortfall_analysis: true
    concentration_testing: true
    data_quality_testing: true
    procyclicality_testing: true

  reconciliation:
    compare_primary_to_independent_implementation: true
    compare_exception_flags: true
    compare_var_values: true
    compare_margin_addons: true
    compare_total_margin: true
    fail_on_unexplained_difference: true

  sensitivity:
    confidence_levels:
      - 0.975
      - 0.990
      - 0.995

    historical_lookback_days:
      - 250
      - 500
      - 750

    ewma_lambdas:
      - 0.90
      - 0.94
      - 0.97

    mpor_days:
      - 1
      - 3
      - 5
      - 10

  benchmark_comparison:
    absolute_difference_tolerance: 0.01
    relative_difference_warning: 0.10
    relative_difference_critical: 0.20

  evidence:
    output_directory: reports/evidence
    table_directory: reports/tables
    figure_directory: reports/figures
    preserve_test_inputs: true
    preserve_test_outputs: true
    preserve_environment_metadata: true
    preserve_configuration_snapshot: true
    preserve_code_version: true
