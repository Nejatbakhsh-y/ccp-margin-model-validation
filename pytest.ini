[pytest]
testpaths =
    tests
python_files =
    test_*.py
python_classes =
    Test*
python_functions =
    test_*
addopts =
    --import-mode=importlib
norecursedirs =
    .git
    .venv
    __pycache__
    .pytest_cache
    reports
    data
    docs
    dashboard
    notebooks
    scripts
    sql
    build
    dist
