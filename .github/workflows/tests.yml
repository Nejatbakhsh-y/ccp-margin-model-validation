name: Python Core Validation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint check
        run: python -m ruff check .

      - name: Ruff formatting check
        run: python -m ruff format --check .

      - name: Run deterministic core tests
        run: |
          python -m pytest --ignore=tests/integration --ignore=tests/test_daily_margin_pipeline.py --ignore=tests/test_sql_pipeline.py --ignore=tests/regression/test_reference_portfolio_results.py --ignore=tests/regression/test_fixed_seed_reproducibility.py --cov=src/ccp_margin --cov-report=term-missing